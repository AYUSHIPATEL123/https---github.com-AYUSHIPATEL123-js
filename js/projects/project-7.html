<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background: linear-gradient(to right, #e7eeeb, #2910b7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1{
            border: dashed 2px black;
            padding: 0.5rem 1rem;
            box-shadow: 1px 3px 5px rgba(7, 7, 7, 0.95);
            margin-bottom: 2rem;
        }
        form{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        label, input, button{
            font-size: 1.5rem;
            margin: 0.5rem;
        }
        #display{
            font-size: 100px;
            margin-top: 1rem;
            font-weight: bold;
            background: linear-gradient(to right, #283f73, #000000);
            --webkit-background-clip: text;
            --wekit-text-fill-color:transparent;
            
            background-clip: text;
            color: transparent;
        }
        button{
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 1px 3px 5px rgba(7, 7, 7, 0.95);
            background-color: #020c13;
            color: white;
        }
    </style>
</head>

<body>
    <h1>Count-Down App</h1>
    <form method="post">
        <label for="countdown">Enter a number:</label>
        <input type="number" id="countdown" name="countdown" required>
        <button type="submit">Start Countdown</button>
    </form>
    <p id="display"></p>
</body>
<script>
    
    const form  = document.querySelector("form");
    const display = document.getElementById("display");
    
    form.addEventListener("submit", function(event){
        event.preventDefault();
        let count = parseInt(document.getElementById('countdown').value);
        if(isNaN(count) || count < 0){
            display.textContent = "Please enter a valid non-negative number.";
            return;
        }

        let countdownInterval = setInterval(() => {
            display.textContent = count
            if(count === 0){
                clearInterval(countdownInterval)
                display.textContent = "Time's Up !!!";
            }
            count--;
        },1000);
    })
</script>
</html>
